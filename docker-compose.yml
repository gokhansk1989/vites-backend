services:
  postgres:
    image: postgres:16-alpine
    container_name: vites_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-vites}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vites_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: vites_meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili-dev-key}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"
    restart: unless-stopped

  api:
    build: .
    container_name: vites_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-dev-password}@postgres:5432/${DB_NAME:-vites}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili-dev-key}
      PORT: 3000
    ports:
      - "3000:3000"
    command: node dist/main.js
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meili_data:
